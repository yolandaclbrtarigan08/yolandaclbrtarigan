<h2>Kalkulator Sederhana</h2>
<p style="text-align:center;">Latihan Operator Matematika (+, -, *, /)</p>

<div class="calculator-box">
    <input type="number" id="num1" placeholder="Angka 1">
    <select id="operator" style="padding: 10px; margin-bottom: 10px;">
        <option value="+">Tambah (+)</option>
        <option value="-">Kurang (-)</option>
        <option value="*">Kali (*)</option>
        <option value="/">Bagi (/)</option>
    </select>
    <input type="number" id="num2" placeholder="Angka 2">
    <br>
    <button class="calc-btn" onclick="hitung()">Hitung</button>
    
    <div id="result" class="result-box">Hasil akan muncul di sini</div>
</div>

<script>
function hitung() {
    let num1 = parseFloat(document.getElementById('num1').value);
    let num2 = parseFloat(document.getElementById('num2').value);
    let operator = document.getElementById('operator').value;
    let resultElement = document.getElementById('result');

    if (isNaN(num1) || isNaN(num2)) {
        resultElement.innerHTML = "Mohon isi angka dengan benar!";
        return;
    }

    let hasil = 0;
    switch (operator) {
        case '+': hasil = num1 + num2; break;
        case '-': hasil = num1 - num2; break;
        case '*': hasil = num1 * num2; break;
        case '/':
            if (num2 === 0) {
                resultElement.innerHTML = "Tidak bisa dibagi dengan nol!";
                return;
            }
            hasil = num1 / num2;
            break;
        default:
            resultElement.innerHTML = "Pilih operator!";
            return;
    }
    resultElement.innerHTML = "Hasil: " + hasil;
}
</script>

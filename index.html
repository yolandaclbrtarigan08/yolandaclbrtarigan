<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jabu Literasi - Budaya Karo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #D2691E 100%);
            color: white;
            overflow-x: hidden;
        }

        .overlay {
            background-color: rgba(0,0,0,0.55);
            min-height: 100vh;
        }

        /* Navigation Arrows - FITUR BARU */
        .nav-arrows {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            z-index: 1002;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .arrow-btn {
            background: linear-gradient(45deg, #FFD700, #FFED4E);
            color: #8B4513;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255,215,0,0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow-btn:hover {
            transform: scale(1.15) translateY(-2px);
            box-shadow: 0 12px 35px rgba(255,215,0,0.6);
        }

        .arrow-btn:disabled {
            background: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            cursor: not-allowed;
            transform: none;
        }

        /* --- LOGIN & REGISTER STYLES --- */
        .login-container {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            margin: 60px auto;
            border: 2px solid rgba(255,215,0,0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .login-container h2 {
            margin-bottom: 30px;
            color: #FFD700;
            font-size: 2rem;
        }

        .login-container label {
            display: block;
            margin-bottom: 8px;
            text-align: left;
            color: #FFD700;
            font-weight: bold;
        }

        .login-container input[type="text"],
        .login-container input[type="password"],
        .login-container input[type="email"],
        .login-container input[type="tel"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .login-container input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .login-container input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        .login-container input[type="submit"] {
            background: linear-gradient(45deg, #FFD700, #FFED4E);
            color: #8B4513;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .login-container input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,215,0,0.4);
        }

        .toggle-link {
            margin-top: 25px;
            font-size: 15px;
        }

        .toggle-link a {
            color: #FFD700;
            text-decoration: none;
            font-weight: bold;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        /* --- NAVIGATION STYLES --- */
        nav {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 3px solid rgba(255,215,0,0.3);
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            margin: 0 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #FFD700;
            background: rgba(255,215,0,0.2);
            transform: translateY(-2px);
        }

        /* --- MAIN CONTENT STYLES --- */
        #main-content {
            padding-top: 20px;
        }

        .container {
            padding: 60px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .section {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active {
            display: block;
        }

        h1 {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        h2 {
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 40px;
            color: #FFD700;
        }

        /* Link Box */
        .link-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .link-box a {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            color: #FFD700;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,215,0,0.3);
        }

        .link-box a:hover {
            background: rgba(255,215,0,0.2);
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .video-box {
            text-align: center;
            margin-top: 50px;
        }

        .video-box h3 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: #FFD700;
        }

        iframe {
            max-width: 100%;
            height: 400px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Lists */
        .section ul {
            list-style: none;
            max-width: 800px;
            margin: 0 auto;
        }

        .section ul li {
            background: rgba(255,255,255,0.1);
            margin: 15px 0;
            padding: 20px;
            border-radius: 12px;
            font-size: 18px;
            border-left: 5px solid #FFD700;
            transition: all 0.3s ease;
        }

        .section ul li:hover {
            background: rgba(255,215,0,0.1);
            transform: translateX(10px);
        }

        /* Event Cards */
        .event-card {
            background: rgba(255,255,255,0.15);
            border-left: 6px solid #FFD700;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .event-date {
            color: #FFD700;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        /* Calculator */
        .calculator-box {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            margin: 40px auto;
            text-align: center;
            border: 2px solid rgba(255,215,0,0.4);
        }

        .calculator-box input,
        .calculator-box select {
            width: 85%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }

        .calc-btn {
            background: linear-gradient(45deg, #FFD700, #FFED4E);
            border: none;
            padding: 15px 30px;
            margin: 15px 5px 0;
            cursor: pointer;
            font-weight: bold;
            border-radius: 30px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .calc-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,215,0,0.4);
        }

        .result-box {
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            padding: 20px;
            background: rgba(255,215,0,0.2);
            border-radius: 12px;
            border: 2px solid #FFD700;
        }

        /* Vision Mission */
        .vision-mission-card {
            background: rgba(255,255,255,0.15);
            border: 3px solid #FFD700;
            padding: 35px;
            margin: 30px 0;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .vision-mission-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255,215,0,0.3);
        }

            color: #FFD700;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 2px 2

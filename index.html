<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jabu Literasi - Perpustakaan Digital Budaya Karo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #D2691E 100%);
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Background Pattern Karo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="karo" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M0 0h20v20H0z" fill="none"/><circle cx="5" cy="5" r="1" fill="rgba(255,215,0,0.1)"/><circle cx="15" cy="15" r="1.5" fill="rgba(255,255,255,0.05)"/><path d="M2 18 Q10 2 18 18" stroke="rgba(255,215,0,0.08)" stroke-width="0.5" fill="none"/></pattern></defs><rect width="100" height="100" fill="url(%23karo)"/></svg>'),
                radial-gradient(circle at 20% 80%, rgba(255,215,0,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.05) 0%, transparent 50%);
            z-index: -2;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        .overlay {
            background: rgba(0,0,0,0.4);
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            padding: 15px 0;
            border-bottom: 2px solid rgba(255,215,0,0.3);
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #FFD700;
            text-decoration: none;
        }

        .logo i {
            margin-right: 10px;
            font-size: 2rem;
            background: linear-gradient(45deg, #FFD700, #FFED4E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255,215,0,0.2);
            color: #FFD700;
            transform: translateY(-2px);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 30px;
            height: 4px;
            background: white;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* Main Content */
        #main-content {
            padding-top: 100px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section {
            display: none;
            padding: 100px 0;
            min-height: 100vh;
        }

        .section.active {
            display: block;
        }

        .section-title {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 50px;
            background: linear-gradient(45deg, #FFD700, white);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* Hero/Dashboard */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 150px 20px 100px;
        }

        .hero-title {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #FFD700, white);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero-desc {
            font-size: 1.4rem;
            margin-bottom: 40px;
            max-width: 700px;
            opacity: 0.95;
        }

        .link-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 50px 0;
        }

        .link-item {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.4s ease;
            text-decoration: none;
            color: white;
        }

        .link-item:hover {
            transform: translateY(-10px);
            background: rgba(255,215,0,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .video-box {
            margin-top: 60px;
            text-align: center;
        }

        .video-box h3 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #FFD700;
        }

        iframe {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Login Container */
        .login-container {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 25px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            margin: 50px auto;
            border: 2px solid rgba(255,215,0,0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-container h2 {
            margin-bottom: 30px;
            color: #FFD700;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #FFD700;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .form-group input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .btn-submit {
            background: linear-gradient(45deg, #FFD700, #FFED4E);
            color: #8B4513;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.4s ease;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,215,0,0.4);
        }

        .toggle-link {
            margin-top: 25px;
            font-size: 1rem;
        }

        .toggle-link a {
            color: #FFD700;
            text-decoration: none;
            font-weight: 500;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        /* Koleksi */
        .koleksi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .koleksi-item {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .koleksi-item:hover {
            transform: translateY(-15px) scale(1.02);
            background: rgba(255,215,0,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .koleksi-item i {
            font-size: 3rem;
            color: #FFD700;
            margin-bottom: 20px;
        }

        .koleksi-item h3 {
            color: #FFD700;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        /* Program & Event */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            border-left: 5px solid #FFD700;
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .event-date {
            color: #FFD700;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        /* Vision Mission */
        .vision-mission-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .vision-mission-card {
            background: rgba(255,255,255,0.1);
            border: 2px solid #FFD700;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .vision-mission-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255,215,0,0.2);
        }

        .vision-mission-card h3 {
            color: #FFD700;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        /* Calculator */
        .calculator-box {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
            border: 2px solid rgba(255,215,0,0.3);
        }

        .calculator-box input, .calculator-box select {
            width: 80%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.1rem;
        }

        .calc-btn {
            background: linear-gradient(45deg, #FFD700, #FFED4E);
            border: none;
            padding: 15px 30px;
            margin: 10px;
            cursor: pointer;
            font-weight: 600;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .calc-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,215,0,0.4);
        }

        .result-box {
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFD700;
            padding: 20px;
            background: rgba(255,215,0,0.1);
            border-radius: 12px;
        }

        /* WhatsApp */
        .wa-popup {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(37,211,102,0.4);
            z-index: 1001;
            text-decoration: none;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .wa-popup:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(37,211,102,0.6);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }
            .nav-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(0,0,0,0.98);
                flex-direction: column;
                padding: 20px;
            }
            .nav-menu.active {
                display: flex;
            }
            .hero-title {
                font-size: 2.5rem;
            }
            .section-title {
                font-size: 2.5rem;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeInUp 0.8s ease forwards;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <!-- Header -->
        <header class="header">
            <nav class="navbar">
                <a href="#" class="logo" onclick="showMenu('dashboard')">
                    <i class="fas fa-book-open"></i>
                    <span>Jabu Literasi</span>
                </a>
                <ul class="nav-menu" id="nav-menu">
                    <li><a class="nav-link active" onclick="showMenu('dashboard')">Beranda</a></li>
                    <li><a class="nav-link" onclick="showMenu('koleksi')">Koleksi Karo</a></li>
                    <li><a class="nav-link" onclick="showMenu('program')">Program</a></li>
                    <li><a class="nav-link" onclick="showMenu('event')">Event</a></li>
                    <li><a class="nav-link" onclick="showMenu('tentang-kami')">Tentang Kami</a></li>
                    <li><a class="nav-link" onclick="showMenu('kalkulator')">Kalkulator</a></li>
                    <li><a class="nav-link" onclick="showMenu('login-register')">Masuk/Daftar</a></li>
                </ul>
                <div

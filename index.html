        /* === ROOT VARIABLES - TEMA COKLAT TANAH KARO === */
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #A0522D;
            --accent-gold: #DAA520;
            --dark-brown: #5D4037;
            --light-cream: #F8F1E9;
            --karo-red: #8B0000;
            --shadow-brown: rgba(139, 69, 19, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #2C1810;
            background: linear-gradient(135deg, var(--light-cream) 0%, #FDF2E9 100%);
            overflow-x: hidden;
        }

        /* === LOADING SCREEN === */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-brown), var(--secondary-brown));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .loader-content {
            text-align: center;
            color: white;
        }

        .loader-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 2.5rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* === HEADER === */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(248, 241, 233, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1000;
            box-shadow: 0 4px 30px var(--shadow-brown);
        }

        .navbar {
            padding: 1.2rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo-icon {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--primary-brown), var(--accent-gold));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 10px 30px var(--shadow-brown);
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-brown), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

            color: var(--dark-brown);
            font-weight: 500;

            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jabu Literasi - Budaya Karo</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background-color: #8B4513;
    color:white;
}

.overlay{
    background-color: rgba(0,0,0,0.55);
    min-height:100vh;
}

/* --- LOGIN & REGISTER STYLES --- */
.login-container {
    background-color: rgba(0,0,0,0.8);
    padding: 40px;
    border-radius: 8px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    margin: auto;
}

.login-container input {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
}

.login-container input[type="submit"] {
    background-color: #FFD700;
    color: black;
    font-weight: bold;
}

/* --- NAVIGATION --- */
nav{
    background-color: rgba(0,0,0,0.8);
    padding:15px;
    display: flex;
    justify-content: space-between;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:#FFD700;
}

/* --- CONTENT --- */
.container{
    padding:40px;
    max-width:900px;
    margin:auto;
}

.section{ display:none; }
.active{ display:block; }

/* --- WHATSAPP POPUP --- */
.wa-popup {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25D366;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* --- INSTAGRAM POPUP (BARU) --- */
.ig-popup {
    position: fixed;
    bottom: 90px;
    right: 20px;
    background-color: #E1306C;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Kalkulator */
.calculator-box {
    text-align:center;
}
</style>

<script>
function showMenu(menu){
    document.querySelectorAll('.section').forEach(sec=>{
        sec.classList.remove('active');
    });
    document.getElementById(menu).classList.add('active');
}

function hitung() {
    let num1 = parseFloat(document.getElementById('num1').value);
    let num2 = parseFloat(document.getElementById('num2').value);
    let operator = document.getElementById('operator').value;

    let hasil = 0;

    switch (operator) {
        case '+': hasil = num1 + num2; break;
        case '-': hasil = num1 - num2; break;
        case '*': hasil = num1 * num2; break;
        case '/': hasil = num1 / num2; break;
    }

    document.getElementById('result').innerHTML = "Hasil: " + hasil;
}
</script>

</head>

<body>
<div class="overlay">

<nav>
    <div>
        <strong>Jabu Literasi</strong>
    </div>

    <div>
        <a onclick="showMenu('dashboard')">Beranda</a>
        <a onclick="showMenu('kalkulator')">Kalkulator</a>
    </div>
</nav>

<div class="container">

<!-- BERANDA -->
<div id="dashboard" class="section active">
    <h1>Jabu Literasi</h1>
    <p>Pusat Budaya Karo</p>
</div>

<!-- KALKULATOR -->
<div id="kalkulator" class="section">
    <h2>Kalkulator</h2>

    <div class="calculator-box">
        <input type="number" id="num1" placeholder="Angka 1">
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        <input type="number" id="num2" placeholder="Angka 2">
        <br><br>
        <button onclick="hitung()">Hitung</button>
        <p id="result"></p>
    </div>
</div>

</div>
</div>

<!-- ================== POPUP PALING BAWAH ================== -->

<!-- Instagram -->
<a href="https://www.instagram.com/caululla__?igsh=YnQyNGhmaGU0NW9p" class="ig-popup" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" width="30">
</a>

<!-- WhatsApp -->
<a href="https://wa.me/6282289121138" class="wa-popup" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
</a>

</body>
</html>

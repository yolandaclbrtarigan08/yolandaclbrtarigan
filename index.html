<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jabu Literasi - Budaya Karo</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background-color: #8B4513;
    color:white;
}

.overlay{
    background-color: rgba(0,0,0,0.55);
    min-height:100vh;
}

/* --- LOGIN & REGISTER STYLES --- */
.login-container {
    background-color: rgba(0,0,0,0.8);
    padding: 40px;
    border-radius: 8px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    margin: auto;
}

.login-container h2 {
    margin-bottom: 20px;
}

.login-container label {
    display: block;
    margin-bottom: 5px;
    text-align: left;
}

.login-container input[type="text"],
.login-container input[type="password"],
.login-container input[type="email"],
.login-container input[type="tel"] {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

.login-container input[type="submit"] {
    background-color: #FFD700;
    color: black;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
}

.login-container input[type="submit"]:hover {
    background-color: #e6c200;
}

.toggle-link {
    margin-top: 15px;
    font-size: 14px;
}

.toggle-link a {
    color: #FFD700;
    text-decoration: underline;
    cursor: pointer;
}

/* --- NAVIGATION STYLES --- */
nav{
    background-color: rgba(0,0,0,0.8);
    padding:15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

.nav-left, .nav-right {
    display: flex;
    align-items: center;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
    font-size: 14px;
}

nav a:hover{
    color:#FFD700;
}

/* --- MAIN CONTENT STYLES --- */
#main-content {
    display: block;
}

.container{
    padding:40px;
    max-width:900px;
    margin:auto;
}

.section{
    display:none;
}

.active{
    display:block;
}

h1,h2{
    text-align:center;
}

.link-box{
    text-align:center;
    margin-top:25px;
}

.link-box a{
    display:block;
    margin:10px;
    color:#FFD700;
    font-size:18px;
    text-decoration:none;
}

.video-box{
    text-align:center;
    margin-top:30px;
}

iframe{
    max-width:100%;
}

/* --- WHATSAPP POPUP --- */
.wa-popup {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25D366;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    z-index: 1000;
    text-decoration: none;
}

    height: 30px;
    fill: white;
}

/* Style khusus untuk background halaman dashboard */
#dashboard {
    background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Karo_Cultural_Pattern.svg/1200px-Karo_Cultural_Pattern.svg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border-radius: 10px;
    padding: 20px;
}

/* --- STYLE UNTUK EVENT & KALKULATOR --- */
.event-card {
    background-color: rgba(255, 255, 255, 0.1);
    border-left: 5px solid #FFD700;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 4px;
}

.event-date {
    color: #FFD700;
    font-weight: bold;
}

.calculator-box {
    background-color: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 8px;
    max-width: 300px;
    margin: 20px auto;
    text-align: center;
}

.calculator-box input {
    width: 80%;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 16px;
}

.calc-btn {
    background-color: #FFD700;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 4px;
}

.calc-btn:hover {
    background-color: #e6c200;
}

.result-box {

.service-tabs {

    background-color: rgba(0,0,0,0.6);
    border-radius: 8px;
    margin-bottom: 20px;

}

.service-tab {

.service-tab.active {

.service-tab:hover {

.service-content {

.service-content.active {
    display: block;
}

.book-card {
    background-color: rgba(255,255,255,0.1);
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    border-left: 4px solid #FFD700;
}

.book-available {
    color: #90EE90;
    font-weight: bold;
}

.book-borrowed {
    color: #FFB6C1;
    font-weight: bold;
}

.borrow-form, .return-form {
    background-color: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.borrow-form input, .return-form input {
    width: calc(100% - 22px);
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 16px;
}

.form-row {
    display: flex;
    gap: 10px;
}

.form-row input {
    flex: 1;
}

.btn-pinjam, .btn-kembali {
    background-color: #FFD700;
    color: black;
    border: none;
    padding: 12px 24px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
}

.btn-pinjam:hover, .btn-kembali:hover {
    background-color: #e6c200;
}

.history-item {
    background-color: rgba(255,255,255,0.05);
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 6px;
    border-left: 4px solid #FFD700;
}

.status-badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: bold;
    margin-top: 5px;
    display: inline-block;
}

.status-pinjam {
    background-color: #90EE90;
    color: black;
}

.status-kembali {
    background-color: #87CEEB;
    color: black;
}

.empty-state {
    text-align: center;
    color: #ccc;
    font-style: italic;
    padding: 40px;
}
</style>

<script>
function showMenu(menu){
    document.querySelectorAll('.section').forEach(sec=>{
        sec.classList.remove('active');
    });
    document.getElementById(menu).classList.add('active');
}

function login(event) {
    event.preventDefault();
    alert('Login Berhasil! Selamat Datang di Jabu Literasi.');
    showMenu('dashboard');
}

function Daftar(event) {
    event.preventDefault();
    alert('Pendaftaran Berhasil!');
    showMenu('dashboard');
}

function toggleForm(type) {
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const toggleText = document.getElementById('toggle-text');

    if (type === 'register') {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
        toggleText.innerHTML = 'Sudah punya akun? <a onclick="toggleForm(\'login\')">Login disini</a>';
    } else {
        registerForm.style.display = 'none';
        loginForm.style.display = 'block';
        toggleText.innerHTML = 'Belum punya akun? <a onclick="toggleForm(\'register\')">Daftar disini</a>';
    }
}

function hitung() {
    let num1 = parseFloat(document.getElementById('num1').value);
    let num2 = parseFloat(document.getElementById('num2').value);
    let operator = document.getElementById('operator').value;
    let resultElement = document.getElementById('result');

    if (isNaN(num1) || isNaN(num2)) {
        resultElement.innerHTML = "Mohon isi angka dengan benar!";
        return;
    }

    let hasil = 0;
    switch (operator) {
        case '+': hasil = num1 + num2; break;
        case '-': hasil = num1 - num2; break;
        case '*': hasil = num1 * num2; break;
        case '/':
            if (num2 === 0) {
                resultElement.innerHTML = "Tidak bisa dibagi dengan nol!";
                return;
            }
            hasil = num1 / num2;
            break;
        default:
            resultElement.innerHTML = "Pilih operator!";
            return;
    }
    resultElement.innerHTML = "Hasil: " + hasil;
}

// --- JAVASCRIPT LAYANAN PERPUSTAKAAN ---
function showServiceTab(tabId) {
    document.querySelectorAll('.service-content').forEach(content => {
        content.classList.remove('active');
    });
    document.querySelectorAll('.service-tab').forEach(tab => {
        tab.classList.remove('active');
    });
    document.getElementById(tabId).classList.add('active');
    event.target.classList.add('active');
}

function pinjamBuku() {
    const nama = document.getElementById('nama-pinjam').value.trim();
    const buku = document.getElementById('buku-pinjam').value.trim();
    
    if (!nama || !buku) {
        alert('❌ Mohon lengkapi Nama dan Buku yang akan dipinjam!');
        return;
    }
    
    // Tambah ke riwayat
    tambahKeRiwayat(nama, buku, 'Dipinjam');
    
    alert(`✅ Peminjaman berhasil!\nNama: ${nama}\nBuku: ${buku}`);
    
    // Reset form
    document.getElementById('nama-pinjam').value = '';
    document.getElementById('buku-pinjam').value = '';
}

function kembalikanBuku() {
    const nama = document.getElementById('nama-kembali').value.trim();
    const buku = document.getElementById('buku-kembali').value.trim();
    
    if (!nama || !buku) {
        alert('❌ Mohon lengkapi Nama dan Judul Buku!');
        return;
    }

    tambahKeRiwayat(nama, buku, 'Dikembalikan');
    
    alert(`✅ Pengembalian berhasil!\nNama: ${nama}\nBuku: ${buku}`);
    
    // Reset form
    document.getElementById('nama-kembali').value = '';
    document.getElementById('buku-kembali').value = '';
}

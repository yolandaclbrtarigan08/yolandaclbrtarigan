/* --- STYLE BARU UNTUK PENCARIAN KOLEKSI --- */

<script>
function showMenu(menu){
    document.querySelectorAll('.section').forEach(sec=>{
        sec.classList.remove('active');
    });
    document.getElementById(menu).classList.add('active');
}

// Fungsi untuk login
function login(event) {
    event.preventDefault();
    alert('Login Berhasil! Selamat Datang di Jabu Literasi.');
    showMenu('dashboard');
}

// Fungsi untuk daftar
function Daftar(event) {
    event.preventDefault();
    alert('Pendaftaran Berhasil!');
    showMenu('dashboard');
}

// Fungsi untuk toggle antara Login dan Register
function toggleForm(type) {
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const toggleText = document.getElementById('toggle-text');

    if (type === 'register') {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
        toggleText.innerHTML = 'Sudah punya akun? <a onclick="toggleForm(\'login\')">Login disini</a>';
    } else {
        registerForm.style.display = 'none';
        loginForm.style.display = 'block';
        toggleText.innerHTML = 'Belum punya akun? <a onclick="toggleForm(\'register\')">Daftar disini</a>';
    }
}

// --- JAVASCRIPT UNTUK PENCARIAN KOLEKSI ---
const koleksiData = [
    {judul: "Umpasa Karo Lengkap", kategori: "Umpasa", status: "Tersedia"},
    {judul: "Tambo Karo Si Telon Merga", kategori: "Sejarah", status: "Tersedia"},
    {judul: "Kamus Bahasa Karo-Indonesia", kategori: "Bahasa", status: "Dipinjam"},
    {judul: "Tari Guro-Guro", kategori: "Seni Tari", status: "Tersedia"},
    {judul: "Adat Peresmian Rumah", kategori: "Adat", status: "Tersedia"},
    {judul: "Musik Gendang Karo", kategori: "Musik", status: "Tersedia"}
];

function cariKoleksi() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const results = document.getElementById('search-results');
    
    if (query === '') {
        results.innerHTML = '<p style="color:#FFD700;">Ketik kata kunci untuk mencari koleksi...</p>';
        return;
    }
    
    const hasil = koleksiData.filter(item => 
        item.judul.toLowerCase().includes(query) || 
        item.kategori.toLowerCase().includes(query)
    );
    
    if (hasil.length === 0) {
        results.innerHTML = '<p style="color:#FF6B6B;">Koleksi tidak ditemukan!</p>';
    } else {
        results.innerHTML = hasil.map(item => `
            <div class="search-item">
                <h4>${item.judul}</h4>
                <p><strong>Kategori:</strong> ${item.kategori} | <strong>Status:</strong> ${item.status}</p>
            </div>
        `).join('');
    }
}

// --- JAVASCRIPT UNTUK LAYANAN ---
function showService(service) {
    const content = document.getElementById('service-content');
    
    switch(service) {
        case 'peminjaman':
            content.innerHTML = `
                <div class="service-card">
                    <h3>📖 Form Peminjaman Buku</h3>
                    <p>Silakan login terlebih dahulu untuk meminjam buku.</p>
                    <button class="service-btn" onclick="showMenu('login-register')">Pinjam Sekarang</button>
                </div>
            `;
            break;
        case 'penhembalian':
            content.innerHTML = `
                <div class="service-card">
                    <h3>📚 Penhembalian Buku</h3>
                    <p>Masukkan kode buku yang akan dikembalikan:</p>
                    <input type="text" placeholder="Kode Buku" style="padding:10px; margin:10px; border-radius:5px;">
                    <button class="service-btn">Kembalikan Buku</button>
                </div>
            `;
            break;
        case 'status':
            content.innerHTML = `
                <div class="service-card">
                    <h3>📊 Status Ketersediaan Buku</h3>
                    <table class="status-table">
                        <tr>
                            <th>Kode Buku</th>
                            <th>Judul</th>
                            <th>Status</th>
                        </tr>
                        <tr>
                            <td>KR001</td>
                            <td>Umpasa Karo Lengkap</td>
                            <td class="status-available">✅ Tersedia</td>
                        </tr>
                        <tr>
                            <td>KR002</td>
                            <td>Kamus Karo</td>
                            <td class="status-borrowed">❌ Dipinjam</td>
                        </tr>
                        <tr>
                            <td>KR003</td>
                            <td>Tambo Karo</td>
                            <td class="status-available">✅ Tersedia</td>
                        </tr>
                    </table>
                </div>
            `;
            break;
        case 'riwayat':
            content.innerHTML = `
                <div class="service-card">
                    <h3>📜 Riwayat Peminjaman</h3>
                    <p>Login untuk melihat riwayat peminjaman Anda.</p>
                    <button class="service-btn" onclick="showMenu('login-register')">Lihat Riwayat</button>
                </div>
            `;
            break;
    }
}

// --- JAVASCRIPT UNTUK KALKULATOR ---
function hitung() {
    let num1 = parseFloat(document.getElementById('num1').value);
    let num2 = parseFloat(document.getElementById('num2').value);
    let operator = document.getElementById('operator').value;
    let resultElement = document.getElementById('result');

    if (isNaN(num1) || isNaN(num2)) {
        resultElement.innerHTML = "Mohon isi angka dengan benar!";
        return;
    }

    let hasil = 0;
    switch (operator) {
        case '+': hasil = num1 + num2; break;
        case '-': hasil = num1 - num2; break;
        case '*': hasil = num1 * num2; break;
        case '/':
            if (num2 === 0) {
                resultElement.innerHTML = "Tidak bisa dibagi dengan nol!";
                return;
            }
            hasil = num1 / num2;
            break;
    }
    resultElement.innerHTML = "Hasil: " + hasil;
}
</script>
